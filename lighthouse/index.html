<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighthouse — 3D · Patryk Wenda</title>
  <meta name="description" content="Interactive 3D lighthouse scene. Model from Spline, rendered with Three.js.">
  <link rel="stylesheet" href="style.css">
  <!-- Three.js r0.165 from CDN (needs network; falls over if jsdelivr is unreachable) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Loading state -->
  <div id="loader" class="loader">
    <div class="loader__spinner"></div>
    <span class="loader__label">Loading scene…</span>
  </div>

  <!-- Controls hint (auto-fades) -->
  <div id="hint" class="hint">
    <span>Drag to orbit · Scroll to zoom · Right-drag to pan</span>
  </div>

  <!-- Error state -->
  <div id="error" class="error" hidden>
    <p>Couldn't load the 3D scene.</p>
    <small class="error__detail"></small>
    <small>Make sure this page is served over http(s), not opened as a local file.</small>
  </div>

  <!-- Debug tool panels (filled in by main.js) -->
  <div id="lightTool" class="light-tool"></div>
  <div id="pixelTool" class="pix-tool"></div>
  <div id="beamTool" class="pix-tool beam-tool"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
